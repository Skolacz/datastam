<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datastam Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">
    <header class="dashboard-header">
        <h1>Social Media Insights</h1>
        <a href="fetch.html" class="btn-new">+ New Story</a>
    </header>

    <main>
        <!-- Filter Sidebar -->
        <aside class="filters-sidebar">
            <h3>Filters</h3>

            <label for="platform-filter">Platform</label>
            <select id="platform-filter">
                <option value="all">All Platforms</option>
                <option value="linkedin">LinkedIn</option>
                <option value="twitter">Twitter/X</option>
                <option value="instagram">Instagram</option>
            </select>

            <label for="status-filter">Status</label>
            <select id="status-filter">
                <option value="all">All Statuses</option>
                <option value="draft">Drafts</option>
                <option value="approved">Approved</option>
                <option value="posted">Posted</option>
            </select>
        </aside>

        <!-- Post Cards Grid -->
        <section>
            <div id="posts-grid" class="posts-grid">
                <!-- Cards injected by dashboard.js -->
            </div>
            <div id="loader" class="hidden">Loading posts...</div>
            <div id="empty-state" class="hidden">
                <p>No posts yet. <a href="fetch.html">Capture a story</a> to get started.</p>
            </div>
        </section>
    </main>

    <!-- Modal for the Side-by-Side Editor -->
    <div id="editor-modal" class="modal hidden">
        <div class="modal-overlay" onclick="closeEditor()"></div>
        <div id="editor-container" class="modal-content"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
