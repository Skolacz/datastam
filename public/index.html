<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <title>Datastam Post Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dashboard-page">
    <header>
        <h1>Dashboard</h1>
        <nav>
            <a href="fetch.html">New Capture</a>
        </nav>
    </header>

    <main>
        <aside class="filters-sidebar">
            <label for="platform-select">Filter by Platform:</label>
            <select id="platform-select">
                <option value="linkedin">LinkedIn</option>
                <option value="twitter">X/Twitter</option>
                <option value="insta">instagram</option>
            </select>

            <label for="status-select">Filter by Status:</label>
            <select id="status-select">
                <option value="all">All Statuses</option>
                <option value="draft">Draft</option>
                <option value="approved">Approved</option>
                <option value="posted">Posted</option>
            </select>
        </aside>

        <section id="posts-container" class="posts-grid">

        </section>
    </main>

    <script src="js/main.js"></script>
</body>
