<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datastam Post Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="api-capture">
        <h2>Generate Social Media Posts from Data</h2>
        <div class="input-group">
        <input type="url" id="datastam-url" placeholder="https://datastam.ai" required>
        <button id="capture-button" onclick="handleCapture()">Generate Post</button>
        </div>
        <div id="loading-spinner">
            <div class="spinner"></div>
            <p>Analyzing data . . . this takes about a minute</p>
        </div>
    </div>

    <script>
        async function handleCapture() {
            // grab elements
            const urlInput = document.getElementById('datastam-url');
            const captureBtn = document.getElementById('capture-button');
            const loader = document.getElementById('loading-spinner');

            const url = urlInput.value;

            // block empty requests from sending and alert user
            if (!url){
                alert("No URL Detected.\nPlease Paste a URL First :3")
                return;
            }

            // disable button and show spinner
            captureBtn.disabled = true;
            loader.style.visibility = 'visible';

            try {
                // API call
                // const response = await fetch('/api/stories/capture',{
                //     method: 'POST',
                //     headers: {'Content-Type': "application/json"},
                //     body: JSON.stringify({url: url})
                // });
                
                const response = await fetch('https://36578268-9908-4fb9-b526-bd2e5ab263cb.mock.pstmn.io',{
                    method: 'POST',
                    headers: {'Content-Type': "application/json"},
                    body: JSON.stringify({url: url})
                });

                const data = await response.json();

                // handle response
                if (data.success){
                    alert("Your story is ready!")
                    //redirect to see results
                    if (data.success) {
                        window.location.href = `/index.html?storyId=${data.storyId}`;
                    }
                } else {
                    throw new Error(data.message || "Failed to Capture :(");
                }
            }
            catch (error) {
                // error handling
                console.error("Error:", error);
                alert("Something went wrong:\n" + error.message);
            }
            finally {
                // reset ui
                captureBtn.disabled = false;
                loader.style.visibility = "hidden"
            }
        }
    </script>



</body>
</html>
